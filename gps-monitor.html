<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeRoute GPS Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 2em; margin-bottom: 10px; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .status-card {
      background: #16213e;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #e94560;
    }
    .status-card.online { border-left-color: #00d9ff; }
    .status-card.error { border-left-color: #e94560; }
    .status-card.warning { border-left-color: #f9a826; }
    .service-name { font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
    .service-status { font-size: 0.9em; opacity: 0.8; }
    .logs-container {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      height: 400px;
      overflow-y: auto;
    }
    .logs-container h2 { margin-bottom: 15px; color: #00d9ff; }
    .log-entry {
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      background: #0f3460;
    }
    .log-entry.success { background: #1a5f3f; }
    .log-entry.error { background: #5f1a1a; }
    .log-entry.warn { background: #5f4f1a; }
    .timestamp { color: #888; margin-right: 10px; }
    .refresh-btn {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .refresh-btn:hover { background: #00a8cc; }
    .test-controls {
      background: #16213e;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
    .test-controls h2 { color: #00d9ff; margin-bottom: 15px; }
    .test-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .test-btn:hover { background: #c73e54; }
    .gps-map {
      background: #0f3460;
      height: 300px;
      border-radius: 10px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚌 SafeRoute GPS Monitor</h1>
    <p>Real-time Service Status & GPS Pipeline Logs</p>
  </div>

  <div class="status-grid">
    <div class="status-card" id="api-status">
      <div class="service-name">📡 API Server</div>
      <div class="service-status">Checking...</div>
    </div>
    <div class="status-card" id="gps-status">
      <div class="service-name">📍 GPS Service</div>
      <div class="service-status">Checking...</div>
    </div>
    <div class="status-card" id="admin-status">
      <div class="service-name">🎛️ Admin Panel</div>
      <div class="service-status">Checking...</div>
    </div>
    <div class="status-card" id="db-status">
      <div class="service-name">🗄️ Database</div>
      <div class="service-status">Checking...</div>
    </div>
  </div>

  <div class="logs-container">
    <h2>📋 System Logs</h2>
    <div id="logs"></div>
    <button class="refresh-btn" onclick="refreshStatus()">🔄 Refresh Status</button>
  </div>

  <div class="test-controls">
    <h2>🧪 GPS Pipeline Tests</h2>
    <button class="test-btn" onclick="testAPI()">Test API</button>
    <button class="test-btn" onclick="testGPS()">Test GPS Service</button>
    <button class="test-btn" onclick="testWebSocket()">Test WebSocket</button>
    <button class="test-btn" onclick="simulateGPS()">📍 Simulate GPS Ping</button>
    <button class="test-btn" onclick="clearLogs()">Clear Logs</button>
  </div>

  <div class="gps-map" id="gps-map">
    GPS Map Visualization (Connect driver to see live location)
  </div>

  <script>
    const logs = [];
    // Note: Open this file via HTTP server, not file://
    // Run: npx serve . or python -m http.server 8080
    // Then access: http://localhost:8080/gps-monitor.html

    const API_URL = 'http://localhost:3001';  
    const GPS_URL = 'http://localhost:3002';

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      logs.push({ timestamp, message, type });
      
      const logDiv = document.getElementById('logs');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="timestamp">${timestamp}</span>${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function checkService(name, url, elementId) {
      const card = document.getElementById(elementId);
      const statusDiv = card.querySelector('.service-status');
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (response.ok) {
          card.className = 'status-card online';
          statusDiv.textContent = '✅ Online';
          log(`${name} is ONLINE: ${JSON.stringify(data)}`, 'success');
          return true;
        } else {
          card.className = 'status-card error';
          statusDiv.textContent = '❌ Error';
          log(`${name} returned error: ${response.status}`, 'error');
          return false;
        }
      } catch (error) {
        card.className = 'status-card error';
        statusDiv.textContent = '❌ Offline';
        log(`${name} is OFFLINE: ${error.message}`, 'error');
        return false;
      }
    }

    async function checkAdminPanel() {
      const card = document.getElementById('admin-status');
      const statusDiv = card.querySelector('.service-status');
      
      try {
        // Try to fetch admin panel with no-cors mode
        const response = await fetch('http://localhost:3000', { 
          method: 'HEAD',
          mode: 'no-cors'
        });
        
        // If we get here without error, admin is likely running
        // (no-cors hides the actual response, but no error means it's up)
        card.className = 'status-card online';
        statusDiv.textContent = '✅ Online';
        log('Admin Panel is ONLINE', 'success');
        return true;
      } catch (error) {
        // Check if we're on file:// protocol
        if (window.location.protocol === 'file:') {
          card.className = 'status-card warning';
          statusDiv.textContent = '⚠️ Check Manually';
          log('Admin Panel: Open via HTTP server to check status', 'warn');
          log('Run: npx serve . then open http://localhost:3000/gps-monitor.html', 'warn');
        } else {
          card.className = 'status-card error';
          statusDiv.textContent = '❌ Offline';
          log('Admin Panel is OFFLINE', 'error');
        }
        return false;
      }
    }

    async function refreshStatus() {
      log('Checking all services...', 'info');
      
      await checkService('API Server', `${API_URL}/health`, 'api-status');
      await checkService('GPS Service', `${GPS_URL}/health`, 'gps-status');
      await checkAdminPanel();
      
      // Check database via API
      try {
        const response = await fetch(`${API_URL}/health`);
        const dbCard = document.getElementById('db-status');
        if (response.ok) {
          dbCard.className = 'status-card online';
          dbCard.querySelector('.service-status').textContent = '✅ Connected';
          log('Database is CONNECTED', 'success');
        }
      } catch (error) {
        const dbCard = document.getElementById('db-status');
        dbCard.className = 'status-card warning';
        dbCard.querySelector('.service-status').textContent = '⚠️ Check via API';
      }
    }

    async function testAPI() {
      log('Testing API Server...', 'info');
      try {
        const response = await fetch(`${API_URL}/health`);
        if (response.ok) {
          log('✅ API Server test PASSED', 'success');
        } else {
          log('❌ API Server test FAILED', 'error');
        }
      } catch (error) {
        log(`❌ API test error: ${error.message}`, 'error');
      }
    }

    async function testGPS() {
      log('Testing GPS Service...', 'info');
      try {
        const response = await fetch(`${GPS_URL}/health`);
        const data = await response.json();
        if (response.ok) {
          log(`✅ GPS Service test PASSED: ${JSON.stringify(data)}`, 'success');
        } else {
          log('❌ GPS Service test FAILED', 'error');
        }
      } catch (error) {
        log(`❌ GPS test error: ${error.message}`, 'error');
      }
    }

    function testWebSocket() {
      log('Testing WebSocket connection...', 'info');
      
      try {
        const ws = new WebSocket('ws://localhost:3002/ws?token=test&tripId=test');
        
        ws.onopen = () => {
          log('✅ WebSocket connected', 'success');
          ws.send(JSON.stringify({
            type: 'location',
            data: { lat: 12.9716, lng: 77.5946, speed: 25 }
          }));
          log('📍 Sent test GPS ping', 'info');
        };
        
        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          log(`✅ Received GPS: Lat=${data.lat}, Lng=${data.lng}`, 'success');
          document.getElementById('gps-map').innerHTML = 
            `<div style="color:#00d9ff">📍 Last Location: ${data.lat}, ${data.lng}</div>`;
        };
        
        ws.onerror = (error) => {
          log('❌ WebSocket error (expected without valid JWT)', 'warn');
        };
        
        setTimeout(() => ws.close(), 5000);
      } catch (error) {
        log(`❌ WebSocket test error: ${error.message}`, 'error');
      }
    }

    function simulateGPS() {
      log('📍 Simulating GPS stream...', 'info');
      
      let count = 0;
      const interval = setInterval(() => {
        count++;
        const lat = 12.9716 + (Math.random() - 0.5) * 0.01;
        const lng = 77.5946 + (Math.random() - 0.5) * 0.01;
        log(`📍 GPS Ping #${count}: ${lat.toFixed(4)}, ${lng.toFixed(4)}`, 'info');
        
        document.getElementById('gps-map').innerHTML = 
          `<div style="color:#00d9ff">📍 Simulated: ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>Count: ${count}</div>`;
        
        if (count >= 10) {
          clearInterval(interval);
          log('✅ GPS simulation complete (10 pings)', 'success');
        }
      }, 1000);
    }

    function clearLogs() {
      document.getElementById('logs').innerHTML = '';
      logs.length = 0;
      log('Logs cleared', 'info');
    }

    // Auto-refresh every 30 seconds
    setInterval(refreshStatus, 30000);
    
    // Initial check
    refreshStatus();
  </script>
</body>
</html>
